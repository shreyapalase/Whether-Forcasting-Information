<!DOCTYPE html>
<html>
<head>
    <title>Weather Prediction App</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Weather Prediction App</h1>

    <form method="POST">
        <input
            type="text"
            name="city"
            id="city"
            placeholder="Enter city name"
            required
        >

        <button type="submit" onclick="showMessage()">
            Get Weather
        </button>
    </form>

    <p id="message"></p>

    {% if weather %}

        {% if weather.error %}
            <h3>{{ weather.error }}</h3>

        {% else %}
            <div class="weather-card">
                <h2>{{ weather.city }}</h2>

                <p>
                    Temperature:
                    {{ weather.temp }} °C
                </p>

                <p>
                    Weather:
                    {{ weather.description }}
                </p>

                <p>
                    Humidity:
                    {{ weather.humidity }}%
                </p>
            </div>
        {% endif %}

    {% endif %}

</div>

<script
src="{{ url_for('static', filename='script.js') }}">
</script>

</body>
</html>
